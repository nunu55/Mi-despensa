<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Cargar recetas de comunidad</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:2rem auto;padding:1rem;background:#f5f5f5}
.card{background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h2{color:#4A5240;margin-bottom:1rem}
.btn{background:#4A5240;color:#fff;border:none;padding:.75rem 1.5rem;border-radius:8px;font-size:1rem;cursor:pointer;width:100%;margin-top:1rem}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:1rem;background:#f0f4eb;border-radius:8px;padding:1rem;font-size:.85rem;line-height:1.8;max-height:400px;overflow-y:auto}
.ok{color:#4A5240}.err{color:#c0392b}.info{color:#888}
</style>
</head>
<body>
<div class="card">
  <h2>🍽️ Cargador de recetas de comunidad</h2>
  <p style="color:#888;font-size:.9rem">Este script sube las recetas de ejemplo a Firestore asociadas a la cuenta <strong>recetas@ladespensa.app</strong>. Ábrelo estando logueado con esa cuenta.</p>
  <div id="status" style="margin-top:1rem;font-size:.9rem;color:#888">Iniciando...</div>
  <button class="btn" id="btn" onclick="uploadRecipes()" disabled>Subir recetas</button>
  <div class="log" id="log" style="display:none"></div>
</div>

<script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyASOOmzqKkVqO6V9Qxrn5Qzu373iVIr7lc",
  authDomain: "la-despensa-8f78e.firebaseapp.com",
  projectId: "la-despensa-8f78e",
  storageBucket: "la-despensa-8f78e.firebasestorage.app",
  messagingSenderId: "480773167529",
  appId: "1:480773167529:web:83b7418daff921c6560cb8"
};

const COMMUNITY_UID = "i17kKygESmNjDWDwelOHib0wvhQ2";

const RECIPES = [
  {name:'Huevos con avena y fruta',category:'Desayunos',time:'10 min',notes:'Huevos revueltos o a la plancha. Avena con agua o leche. Acompañar de fruta de temporada.',ingredients:[{name:'Huevos',amount:2,unit:'ud'},{name:'Claras de huevo',amount:150,unit:'g'},{name:'Avena',amount:40,unit:'g'},{name:'Fruta',amount:1,unit:'ud'}]},
  {name:'Yogur proteico con avena y nueces',category:'Desayunos',time:'5 min',notes:'Mezclar yogur con avena. Añadir nueces y fruta al gusto.',ingredients:[{name:'Yogur alto en proteína',amount:250,unit:'g'},{name:'Avena',amount:30,unit:'g'},{name:'Nueces',amount:10,unit:'g'},{name:'Fruta',amount:1,unit:'ud'}]},
  {name:'Tostadas de aguacate con huevos',category:'Desayunos',time:'10 min',notes:'Tostar el pan. Aplastar el aguacate con sal y limón. Huevos al gusto.',ingredients:[{name:'Pan',amount:60,unit:'g'},{name:'Aguacate',amount:80,unit:'g'},{name:'Huevos',amount:2,unit:'ud'}]},
  {name:'Batido proteico con plátano',category:'Desayunos',time:'5 min',notes:'Batir todos los ingredientes hasta obtener una textura homogénea.',ingredients:[{name:'Proteína en polvo (scoop)',amount:1,unit:'ud'},{name:'Leche o bebida vegetal',amount:200,unit:'ml'},{name:'Avena',amount:40,unit:'g'},{name:'Plátano',amount:1,unit:'ud'}]},
  {name:'Queso fresco con granola y frutos rojos',category:'Desayunos',time:'5 min',notes:'Servir el queso fresco batido con granola o avena por encima y frutos rojos.',ingredients:[{name:'Queso fresco batido',amount:250,unit:'g'},{name:'Granola o avena',amount:30,unit:'g'},{name:'Frutos rojos',amount:80,unit:'g'}]},
  {name:'Tortitas de avena con yogur',category:'Desayunos',time:'15 min',notes:'Mezclar avena, claras y huevo. Hacer tortitas en sartén antiadherente. Acompañar de yogur o fruta.',ingredients:[{name:'Avena',amount:40,unit:'g'},{name:'Claras de huevo',amount:60,unit:'g'},{name:'Huevo',amount:1,unit:'ud'},{name:'Yogur o fruta',amount:1,unit:'ud'}]},
  {name:'Tostadas con jamón y tomate',category:'Desayunos',time:'5 min',notes:'Tostar el pan. Frotar con tomate y añadir el aceite. Colocar el jamón encima.',ingredients:[{name:'Pan',amount:60,unit:'g'},{name:'Jamón serrano o cocido',amount:60,unit:'g'},{name:'Tomate',amount:1,unit:'ud'},{name:'Aceite de oliva',amount:5,unit:'g'}]},
  {name:'Arroz con pollo y verduras',category:'Plato único',time:'30 min',notes:'Cocinar el arroz. Hacer el pollo a la plancha con verduras. Mezclar y aliñar con AOVE.',ingredients:[{name:'Arroz cocido',amount:120,unit:'g'},{name:'Pollo',amount:150,unit:'g'},{name:'Verduras mixtas',amount:150,unit:'g'},{name:'Aceite de oliva (AOVE)',amount:10,unit:'g'}]},
  {name:'Pasta con atún y tomate',category:'Plato único',time:'20 min',notes:'Cocer la pasta. Mezclar con atún escurrido, tomate y verduras. Aliñar con AOVE.',ingredients:[{name:'Pasta',amount:80,unit:'g'},{name:'Atún en lata',amount:1,unit:'ud'},{name:'Tomate',amount:100,unit:'g'},{name:'Verduras',amount:100,unit:'g'},{name:'Aceite de oliva (AOVE)',amount:10,unit:'g'}]},
  {name:'Patata con carne picada y verduras',category:'Plato único',time:'35 min',notes:'Cocer o asar la patata. Hacer la carne picada con verduras a la sartén.',ingredients:[{name:'Patata',amount:200,unit:'g'},{name:'Carne picada magra',amount:150,unit:'g'},{name:'Verduras',amount:150,unit:'g'}]},
  {name:'Ensalada completa con pollo',category:'Plato único',time:'15 min',notes:'Base de verduras variadas. Añadir pollo a la plancha, queso y pan. Aliñar con aceite.',ingredients:[{name:'Verduras variadas',amount:150,unit:'g'},{name:'Pollo',amount:120,unit:'g'},{name:'Queso',amount:40,unit:'g'},{name:'Pan',amount:30,unit:'g'},{name:'Aceite de oliva',amount:10,unit:'g'}]},
  {name:'Lentejas con verduras',category:'Plato único',time:'45 min',notes:'Cocer lentejas con verduras. Añadir huevo cocido o pollo para completar la proteína.',ingredients:[{name:'Lentejas (en seco)',amount:60,unit:'g'},{name:'Verduras',amount:150,unit:'g'},{name:'Huevo cocido o pollo',amount:100,unit:'g'}]},
  {name:'Burrito bowl',category:'Plato único',time:'25 min',notes:'Cocer el arroz. Hacer el pollo o ternera a la plancha. Montar el bowl con maíz, verduras y yogur como salsa.',ingredients:[{name:'Arroz',amount:100,unit:'g'},{name:'Pollo o ternera',amount:120,unit:'g'},{name:'Maíz',amount:50,unit:'g'},{name:'Verduras',amount:100,unit:'g'},{name:'Yogur natural',amount:50,unit:'g'}]},
  {name:'Cous cous con pollo y verduras',category:'Plato único',time:'20 min',notes:'Hidratar el cous cous con agua caliente. Hacer el pollo y verduras a la plancha. Mezclar y aliñar.',ingredients:[{name:'Cous cous',amount:80,unit:'g'},{name:'Pollo',amount:150,unit:'g'},{name:'Verduras',amount:150,unit:'g'},{name:'Aceite de oliva',amount:10,unit:'g'}]},
  {name:'Pollo a la plancha con verduras',category:'Segundos',time:'20 min',notes:'Pollo sazonado a la plancha. Verduras salteadas o al vapor. Acompañar de pan.',ingredients:[{name:'Pollo',amount:150,unit:'g'},{name:'Verduras',amount:200,unit:'g'},{name:'Pan',amount:40,unit:'g'}]},
  {name:'Tortilla con ensalada',category:'Segundos',time:'15 min',notes:'Hacer la tortilla con huevos y claras. Servir con ensalada grande y pan.',ingredients:[{name:'Huevos',amount:2,unit:'ud'},{name:'Claras de huevo',amount:60,unit:'g'},{name:'Ensalada',amount:200,unit:'g'},{name:'Pan',amount:30,unit:'g'}]},
  {name:'Salmón con verduras',category:'Segundos',time:'20 min',notes:'Salmón al horno o a la plancha con verduras de temporada.',ingredients:[{name:'Salmón',amount:150,unit:'g'},{name:'Verduras',amount:200,unit:'g'}]},
  {name:'Ternera con verduras y pan',category:'Segundos',time:'20 min',notes:'Filete de ternera a la plancha con verduras salteadas. Acompañar de pan.',ingredients:[{name:'Ternera',amount:150,unit:'g'},{name:'Verduras',amount:200,unit:'g'},{name:'Pan',amount:35,unit:'g'}]},
  {name:'Revuelto de champiñones con ensalada',category:'Segundos',time:'15 min',notes:'Saltear champiñones. Añadir huevos y claras y remover. Servir con ensalada.',ingredients:[{name:'Huevos',amount:2,unit:'ud'},{name:'Claras de huevo',amount:60,unit:'g'},{name:'Champiñones',amount:150,unit:'g'},{name:'Ensalada',amount:150,unit:'g'}]},
  {name:'Queso fresco con fruta y nueces',category:'Segundos',time:'5 min',notes:'Servir el queso fresco batido con fruta y nueces. Cena ligera y proteica.',ingredients:[{name:'Queso fresco batido',amount:200,unit:'g'},{name:'Fruta',amount:1,unit:'ud'},{name:'Nueces',amount:10,unit:'g'}]},
  {name:'Tostadas con atún y tomate',category:'Segundos',time:'5 min',notes:'Tostar el pan. Añadir atún y tomate aliñado con aceite.',ingredients:[{name:'Pan',amount:60,unit:'g'},{name:'Atún en lata',amount:1,unit:'ud'},{name:'Tomate',amount:100,unit:'g'},{name:'Aceite de oliva',amount:5,unit:'g'}]},
  {name:'Yogur alto en proteína',category:'Snacks',time:'0 min',notes:'Snack proteico rápido. Se puede añadir fruta o frutos secos.',ingredients:[{name:'Yogur alto en proteína',amount:200,unit:'g'}]},
  {name:'Batido de proteína',category:'Snacks',time:'2 min',notes:'Mezclar la proteína en polvo con leche o agua. Opción rápida post-entreno.',ingredients:[{name:'Proteína en polvo (scoop)',amount:1,unit:'ud'},{name:'Leche o agua',amount:250,unit:'ml'}]},
  {name:'Queso fresco batido',category:'Snacks',time:'0 min',notes:'Solo o con fruta. Alto en proteína y bajo en grasa.',ingredients:[{name:'Queso fresco batido',amount:150,unit:'g'}]},
  {name:'Fruta con frutos secos',category:'Snacks',time:'2 min',notes:'Combinación de hidratos y grasa saludable. Ideal entre comidas.',ingredients:[{name:'Fruta',amount:1,unit:'ud'},{name:'Frutos secos',amount:12,unit:'g'}]},
  {name:'Tostada con queso fresco',category:'Snacks',time:'3 min',notes:'Tostada ligera con queso fresco. Snack saciante.',ingredients:[{name:'Pan',amount:30,unit:'g'},{name:'Queso fresco',amount:50,unit:'g'}]},
  {name:'Huevo cocido con fruta',category:'Snacks',time:'10 min',notes:'Snack proteico y saciante. Hervir el huevo 10 minutos.',ingredients:[{name:'Huevo cocido',amount:1,unit:'ud'},{name:'Fruta',amount:1,unit:'ud'}]},
];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function log(msg, type='info'){
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

onAuthStateChanged(auth, user => {
  const status = document.getElementById('status');
  const btn = document.getElementById('btn');
  if(!user){
    status.textContent = '⚠️ No has iniciado sesión. Abre la app, entra con recetas@ladespensa.app, y vuelve a esta página.';
    status.style.color = '#c0392b';
  } else if(user.uid !== COMMUNITY_UID){
    status.textContent = `⚠️ Has iniciado sesión con ${user.email}, pero necesitas la cuenta recetas@ladespensa.app.`;
    status.style.color = '#c0392b';
  } else {
    status.textContent = `✅ Conectado como ${user.email}. Listo para subir ${RECIPES.length} recetas.`;
    status.style.color = '#4A5240';
    btn.disabled = false;
  }
});

window.uploadRecipes = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Subiendo...';
  log('Comprobando recetas existentes...', 'info');

  const q = query(collection(db,'recipes'), where('uid','==', COMMUNITY_UID));
  const existing = await getDocs(q);
  if(existing.docs.length > 0){
    log(`Ya existen ${existing.docs.length} recetas de comunidad. Borra este script si ya terminaste.`, 'err');
    btn.disabled = false; btn.textContent = 'Subir recetas';
    return;
  }

  let ok = 0, err = 0;
  for(const r of RECIPES){
    try{
      await addDoc(collection(db,'recipes'), {
        ...r,
        uid: COMMUNITY_UID,
        public: true,
        photo: null,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      log(`✅ ${r.name}`, 'ok');
      ok++;
    } catch(e){
      log(`❌ Error en "${r.name}": ${e.message}`, 'err');
      err++;
    }
  }
  log(`<br><strong>Terminado: ${ok} recetas subidas, ${err} errores.</strong>`, ok===RECIPES.length?'ok':'err');
  btn.textContent = '¡Listo!';
};
</script>
</body>
</html>
