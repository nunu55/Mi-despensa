<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="La Despensa - Planificador de comidas semanal con lista de la compra automática">
<title>La Despensa · Planificador de comidas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A5240">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Despensa">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAFAF7;--warm:#F5F0E8;--olive:#4A5240;--rust:#B85C38;--sage:#7A8B6F;
  --text:#2C2C28;--muted:#888880;--border:#E2DDD4;--white:#FFFFFF;
  --card-shadow:0 1px 3px rgba(0,0,0,0.06);
}
@media(prefers-color-scheme:dark){
  :root{
    --cream:#1C1C19;--warm:#252520;--olive:#A0B090;--rust:#D4795A;--sage:#9AAD8F;
    --text:#E8E4DC;--muted:#888880;--border:#333330;--white:#252520;
  }
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px}
h1,h2,h3{font-family:'Playfair Display',serif}

.nav{background:var(--olive);padding:0 1rem;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.nav-brand{font-family:'Playfair Display',serif;color:#fff;font-size:1.2rem;padding:1rem 1rem 1rem 0;margin-right:auto;white-space:nowrap}
.nav-brand span{color:#C8D4A0;font-size:.8rem;display:block;font-family:'DM Sans',sans-serif;font-weight:300}
.nav-tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-tab{background:none;border:none;color:rgba(255,255,255,0.65);padding:.85rem 1rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:400;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.02em}
.nav-tab:hover{color:#fff}
.nav-tab.active{color:#fff;border-bottom-color:#C8D4A0}

.main{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
.section{display:none}.section.active{display:block}

.card{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:var(--card-shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-size:1.05rem;font-weight:500;color:var(--olive)}

input,select,textarea{width:100%;padding:.6rem .85rem;border:0.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;background:var(--cream);color:var(--text);outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--sage)}
label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.form-group{margin-bottom:.75rem}

.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;transition:all .2s;letter-spacing:.01em}
.btn-primary{background:var(--olive);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:none;border:0.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--sage);color:var(--sage)}
.btn-sm{padding:.35rem .75rem;font-size:.78rem}
.btn-icon{padding:.35rem .5rem;background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;border-radius:6px;transition:all .2s;display:inline-flex;align-items:center}
.btn-icon:hover{color:var(--text);background:var(--warm)}

.recipe-card{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between;transition:all .2s;box-shadow:var(--card-shadow)}
.recipe-card:hover{border-color:var(--sage)}
.recipe-name{font-weight:500;font-size:.95rem;margin-bottom:.2rem}
.recipe-meta{font-size:.78rem;color:var(--muted)}
.recipe-actions{display:flex;gap:.3rem;flex-shrink:0}

.ingredient-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.ingredient-row input[type=text]{flex:2}
.ingredient-row input[type=number]{flex:1;min-width:60px}
.ingredient-row select{flex:1;min-width:55px}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem;margin-bottom:1rem}
@media(max-width:700px){
  .week-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:400px){
  .week-grid{grid-template-columns:1fr}
}
.day-cell{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:.7rem .6rem;min-height:120px;transition:border-color .2s}
.day-cell:hover{border-color:var(--sage)}
.day-name{font-size:.72rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem}
.meal-slot{margin-bottom:.4rem}
.meal-label{font-size:.68rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.2rem}
.meal-item{background:var(--warm);border-radius:6px;padding:.3rem .5rem;font-size:.75rem;color:var(--text);display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem;border:0.5px solid var(--border)}
.meal-item .remove-meal{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:0 2px;line-height:1}
.meal-item .remove-meal:hover{color:#E24B4A}
.add-meal-btn{background:none;border:0.5px dashed var(--border);border-radius:6px;padding:.25rem .4rem;font-size:.72rem;color:var(--muted);cursor:pointer;width:100%;text-align:center;transition:all .2s;margin-top:.2rem}
.add-meal-btn:hover{border-color:var(--sage);color:var(--sage)}

.shop-category{margin-bottom:1.25rem}
.shop-category-title{font-size:.75rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:0.5px solid var(--border)}
.shop-item{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:0.5px solid var(--border)}
.shop-item:last-child{border-bottom:none}
.shop-item input[type=checkbox]{width:16px;height:16px;flex-shrink:0;accent-color:var(--olive);cursor:pointer}
.shop-item-name{flex:1;font-size:.9rem}
.shop-item-name.checked{text-decoration:line-through;color:var(--muted)}
.shop-item-amount{font-size:.82rem;color:var(--muted);font-weight:500;white-space:nowrap}

.persons-bar{display:flex;align-items:center;gap:.75rem;background:var(--warm);border:0.5px solid var(--border);border-radius:10px;padding:.6rem 1rem;margin-bottom:1rem}
.persons-label{font-size:.82rem;color:var(--muted);font-weight:500;flex:1}
.persons-control{display:flex;align-items:center;gap:.5rem}
.persons-btn{width:28px;height:28px;border-radius:50%;background:var(--olive);color:#fff;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;font-weight:500;transition:all .2s}
.persons-btn:hover{opacity:.85}
.persons-count{font-size:1.1rem;font-weight:500;min-width:20px;text-align:center;color:var(--olive)}

.badge{display:inline-block;padding:.15rem .5rem;border-radius:20px;font-size:.7rem;font-weight:500}
.badge-olive{background:#E8EDE0;color:#3a4230}

.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);border-radius:14px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal-title{font-size:1.2rem;margin-bottom:1.25rem;color:var(--olive)}
.modal-footer{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.25rem;padding-top:.75rem;border-top:0.5px solid var(--border)}

.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.empty p{font-size:.9rem;line-height:1.6}

.flex{display:flex}.gap-sm{gap:.5rem}.items-center{align-items:center}.justify-between{justify-content:space-between}.mb-sm{margin-bottom:.5rem}.mb-md{margin-bottom:1rem}.text-muted{color:var(--muted);font-size:.85rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.section-title{font-size:1.4rem;color:var(--olive)}
.divider{border:none;border-top:0.5px solid var(--border);margin:1rem 0}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">La Despensa<span>planificador de comidas</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('recipes',this)">Recetas</button>
    <button class="nav-tab" onclick="showSection('planner',this)">Semana</button>
    <button class="nav-tab" onclick="showSection('shopping',this)">Compra</button>
  </div>
</nav>

<div class="main">

<div id="s-recipes" class="section active">
  <div class="section-header">
    <h2 class="section-title">Mis Recetas</h2>
    <button class="btn btn-primary" onclick="openRecipeModal()">+ Nueva receta</button>
  </div>
  <div id="recipe-list"></div>
</div>

<div id="s-planner" class="section">
  <div class="section-header">
    <h2 class="section-title">Menú Semanal</h2>
  </div>
  <div class="persons-bar">
    <div class="persons-label">Número de personas para esta semana</div>
    <div class="persons-control">
      <button class="persons-btn" onclick="changePersons(-1)">−</button>
      <span class="persons-count" id="persons-count">2</span>
      <button class="persons-btn" onclick="changePersons(1)">+</button>
    </div>
  </div>
  <div class="week-grid" id="week-grid"></div>
</div>

<div id="s-shopping" class="section">
  <div class="section-header">
    <h2 class="section-title">Lista de la Compra</h2>
    <div class="flex gap-sm">
      <button class="btn btn-outline btn-sm" onclick="generateShopping()">↻ Actualizar</button>
      <button class="btn btn-primary btn-sm" onclick="clearChecked()">Limpiar marcados</button>
    </div>
  </div>
  <div id="shopping-persons" class="text-muted mb-md"></div>
  <div id="shopping-list"></div>
</div>

</div>

<!-- MODAL RECETA -->
<div class="modal-backdrop" id="recipe-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 class="modal-title" id="modal-title">Nueva Receta</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Nombre de la receta</label>
        <input type="text" id="r-name" placeholder="Ej: Paella valenciana">
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="r-cat">
          <option value="Desayunos">Desayunos</option>
          <option value="Entrantes">Entrantes</option>
          <option value="Primeros" selected>Primeros</option>
          <option value="Segundos">Segundos</option>
          <option value="Postres">Postres</option>
          <option value="Meriendas">Meriendas</option>
          <option value="Otros">Otros</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Tiempo de preparación</label>
      <input type="text" id="r-time" placeholder="Ej: 30 min">
    </div>
    <hr class="divider">
    <div class="flex items-center justify-between mb-sm">
      <label style="margin:0;font-size:.82rem">Ingredientes <span style="color:var(--muted)">(para 1 persona)</span></label>
      <button class="btn btn-outline btn-sm" onclick="addIngredient()">+ Añadir</button>
    </div>
    <div id="ingredients-container"></div>
    <hr class="divider">
    <div class="form-group">
      <label>Notas / Elaboración</label>
      <textarea id="r-notes" rows="3" placeholder="Pasos de preparación, trucos..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Guardar receta</button>
    </div>
  </div>
</div>

<!-- MODAL AÑADIR COMIDA -->
<div class="modal-backdrop" id="meal-modal" onclick="if(event.target===this)closeMealModal()">
  <div class="modal" style="max-width:360px">
    <h3 class="modal-title">Añadir al menú</h3>
    <input type="hidden" id="m-day">
    <div class="form-group">
      <label>Comida del día</label>
      <select id="m-slot-sel">
        <option value="desayuno">Desayuno</option>
        <option value="comida" selected>Comida</option>
        <option value="merienda">Merienda</option>
        <option value="cena">Cena</option>
      </select>
    </div>
    <div class="form-group">
      <label>Receta</label>
      <select id="m-recipe"></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeMealModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMeal()">Añadir</button>
    </div>
  </div>
</div>

<script>
const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const SLOTS=['desayuno','comida','merienda','cena'];
const SLOT_LABELS={desayuno:'Desayuno',comida:'Comida',merienda:'Merienda',cena:'Cena'};
const UNITS=['g','kg','ml','l','ud','cdta','cda','taza','al gusto'];

let state={recipes:[],plan:{},persons:2,shopping:{},editingId:null};

function load(){
  try{const s=localStorage.getItem('despensa-v1');if(s)state={...state,...JSON.parse(s)}}catch(e){}
}
function save(){
  try{const {editingId,...s}=state;localStorage.setItem('despensa-v1',JSON.stringify(s))}catch(e){}
}

function showSection(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='recipes') renderRecipes();
  if(id==='planner') renderPlanner();
  if(id==='shopping') renderShopping();
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

// ===== RECETAS =====
function renderRecipes(){
  const c=document.getElementById('recipe-list');
  if(!state.recipes.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🍳</div><p>Aún no tienes recetas.<br>¡Añade tu primera receta!</p></div>`;return;
  }
  c.innerHTML=state.recipes.map(r=>`
    <div class="recipe-card">
      <div style="overflow:hidden">
        <div class="recipe-name">${esc(r.name)}</div>
        <div class="recipe-meta">
          <span class="badge badge-olive">${esc(r.category)}</span>
          ${r.time?`<span style="margin-left:.5rem">${esc(r.time)}</span>`:''}
          <span style="margin-left:.5rem">${r.ingredients.length} ingrediente${r.ingredients.length!==1?'s':''}</span>
        </div>
      </div>
      <div class="recipe-actions">
        <button class="btn-icon" title="Editar" onclick="editRecipe('${r.id}')">✏️</button>
        <button class="btn-icon" title="Eliminar" onclick="deleteRecipe('${r.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let ingCount=0;
function addIngredient(name='',amount='',unit='g'){
  const c=document.getElementById('ingredients-container');
  const div=document.createElement('div');
  div.className='ingredient-row';
  div.innerHTML=`
    <input type="text" placeholder="Ingrediente" value="${esc(name)}" style="flex:2">
    <input type="number" placeholder="Cant." value="${amount}" min="0" step="any" style="flex:1;min-width:65px">
    <select style="flex:1;min-width:65px">${UNITS.map(u=>`<option${u===unit?' selected':''}>${u}</option>`).join('')}</select>
    <button class="btn-icon" onclick="this.closest('.ingredient-row').remove()" style="flex-shrink:0" title="Eliminar">✕</button>
  `;
  c.appendChild(div);
}

function openRecipeModal(id){
  state.editingId=id||null;
  document.getElementById('modal-title').textContent=id?'Editar Receta':'Nueva Receta';
  document.getElementById('ingredients-container').innerHTML='';
  ingCount=0;
  if(id){
    const r=state.recipes.find(x=>x.id===id);
    document.getElementById('r-name').value=r.name;
    document.getElementById('r-cat').value=r.category;
    document.getElementById('r-time').value=r.time||'';
    document.getElementById('r-notes').value=r.notes||'';
    r.ingredients.forEach(i=>addIngredient(i.name,i.amount,i.unit));
  } else {
    document.getElementById('r-name').value='';
    document.getElementById('r-cat').value='Primeros';
    document.getElementById('r-time').value='';
    document.getElementById('r-notes').value='';
    addIngredient();
  }
  document.getElementById('recipe-modal').classList.add('open');
  setTimeout(()=>document.getElementById('r-name').focus(),100);
}

function editRecipe(id){openRecipeModal(id)}

function deleteRecipe(id){
  if(!confirm('¿Eliminar esta receta? También se quitará del menú semanal.')) return;
  state.recipes=state.recipes.filter(r=>r.id!==id);
  Object.keys(state.plan).forEach(day=>{
    Object.keys(state.plan[day]).forEach(slot=>{
      state.plan[day][slot]=state.plan[day][slot].filter(rid=>rid!==id);
    });
  });
  save();renderRecipes();
}

function saveRecipe(){
  const name=document.getElementById('r-name').value.trim();
  if(!name){alert('Escribe el nombre de la receta');return}
  const rows=document.querySelectorAll('#ingredients-container .ingredient-row');
  const ingredients=[];
  rows.forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const sel=row.querySelector('select');
    const n=inputs[0].value.trim();
    const a=parseFloat(inputs[1].value)||0;
    const u=sel.value;
    if(n) ingredients.push({name:n,amount:a,unit:u});
  });
  const recipe={
    id:state.editingId||uid(),
    name,
    category:document.getElementById('r-cat').value,
    time:document.getElementById('r-time').value.trim(),
    notes:document.getElementById('r-notes').value.trim(),
    ingredients
  };
  if(state.editingId){
    const idx=state.recipes.findIndex(r=>r.id===state.editingId);
    state.recipes[idx]=recipe;
  } else {
    state.recipes.push(recipe);
  }
  save();closeModal();renderRecipes();
}

function closeModal(){
  document.getElementById('recipe-modal').classList.remove('open');
  state.editingId=null;
}

// ===== PLANNER =====
function renderPlanner(){
  document.getElementById('persons-count').textContent=state.persons;
  const grid=document.getElementById('week-grid');
  grid.innerHTML=DAYS.map(day=>{
    const dp=state.plan[day]||{};
    return `<div class="day-cell">
      <div class="day-name">${day.substring(0,3)}</div>
      ${SLOTS.map(slot=>{
        const meals=dp[slot]||[];
        const items=meals.map(rid=>{
          const r=state.recipes.find(x=>x.id===rid);
          const rname=r?r.name:'?';
          return `<div class="meal-item"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px;display:block" title="${esc(rname)}">${esc(rname)}</span><button class="remove-meal" onclick="removeMeal('${day}','${slot}','${rid}')" title="Quitar">✕</button></div>`;
        }).join('');
        return `<div class="meal-slot">
          <div class="meal-label">${SLOT_LABELS[slot]}</div>
          ${items}
          <button class="add-meal-btn" onclick="openMealModal('${day}','${slot}')">+</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function changePersons(d){
  state.persons=Math.max(1,Math.min(20,state.persons+d));
  save();
  document.getElementById('persons-count').textContent=state.persons;
}

function openMealModal(day,slot){
  if(!state.recipes.length){alert('Primero añade recetas en la sección "Recetas"');return}
  document.getElementById('m-day').value=day;
  document.getElementById('m-slot-sel').value=slot;
  const sel=document.getElementById('m-recipe');
  sel.innerHTML=state.recipes.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('');
  document.getElementById('meal-modal').classList.add('open');
}

function closeMealModal(){document.getElementById('meal-modal').classList.remove('open')}

function saveMeal(){
  const day=document.getElementById('m-day').value;
  const slot=document.getElementById('m-slot-sel').value;
  const rid=document.getElementById('m-recipe').value;
  if(!state.plan[day]) state.plan[day]={};
  if(!state.plan[day][slot]) state.plan[day][slot]=[];
  state.plan[day][slot].push(rid);
  save();closeMealModal();renderPlanner();
}

function removeMeal(day,slot,rid){
  if(state.plan[day]&&state.plan[day][slot]){
    const idx=state.plan[day][slot].indexOf(rid);
    if(idx>-1) state.plan[day][slot].splice(idx,1);
  }
  save();renderPlanner();
}

// ===== COMPRA =====
function generateShopping(){
  const totals={};
  Object.values(state.plan).forEach(dp=>{
    Object.values(dp).forEach(meals=>{
      meals.forEach(rid=>{
        const r=state.recipes.find(x=>x.id===rid);
        if(!r) return;
        r.ingredients.forEach(ing=>{
          const key=ing.name.toLowerCase().trim()+'__'+ing.unit;
          if(!totals[key]) totals[key]={name:ing.name,amount:0,unit:ing.unit};
          totals[key].amount+=ing.amount*state.persons;
        });
      });
    });
  });
  const prev=state.shopping;
  state.shopping={};
  Object.values(totals).forEach(item=>{
    const key=item.name.toLowerCase()+'__'+item.unit;
    state.shopping[key]={name:item.name,amount:item.amount,unit:item.unit,checked:prev[key]?prev[key].checked:false};
  });
  save();renderShopping();
}

function renderShopping(){
  const el=document.getElementById('shopping-list');
  const items=Object.values(state.shopping);
  document.getElementById('shopping-persons').textContent=
    items.length?`Lista calculada para ${state.persons} persona${state.persons!==1?'s':''}`:'' ;
  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><p>Planifica tu semana en "Semana"<br>y pulsa "↻ Actualizar" para generar<br>la lista automáticamente.</p></div>`;
    return;
  }
  items.sort((a,b)=>a.checked-b.checked||a.name.localeCompare(b.name,'es'));
  const unchecked=items.filter(i=>!i.checked);
  const checked=items.filter(i=>i.checked);
  let html='';
  if(unchecked.length) html+=`<div class="shop-category"><div class="shop-category-title">Por comprar (${unchecked.length})</div>${unchecked.map(shopItem).join('')}</div>`;
  if(checked.length) html+=`<div class="shop-category"><div class="shop-category-title">Ya en el carro (${checked.length})</div>${checked.map(shopItem).join('')}</div>`;
  el.innerHTML=html;
}

function shopItem(i){
  const key=i.name.toLowerCase()+'__'+i.unit;
  const amt=i.unit==='al gusto'?'al gusto':`${fmtAmt(i.amount)} ${i.unit}`;
  return `<div class="shop-item">
    <input type="checkbox" ${i.checked?'checked':''} onchange="toggleItem('${esc(key)}',this.checked)">
    <span class="shop-item-name${i.checked?' checked':''}">${esc(i.name)}</span>
    <span class="shop-item-amount">${amt}</span>
  </div>`;
}

function fmtAmt(n){
  if(n===Math.round(n)) return n.toString();
  return parseFloat(n.toFixed(1)).toString();
}

function toggleItem(key,val){
  if(state.shopping[key]) state.shopping[key].checked=val;
  save();renderShopping();
}

function clearChecked(){
  Object.keys(state.shopping).forEach(k=>{if(state.shopping[k].checked) delete state.shopping[k]});
  save();renderShopping();
}

// Init
load();
if(!state.recipes.length){
  state.recipes=[
    {id:'demo1',name:'Tortilla de patatas',category:'Segundos',time:'25 min',notes:'Cuajar a fuego lento.',ingredients:[{name:'Patatas',amount:200,unit:'g'},{name:'Huevos',amount:2,unit:'ud'},{name:'Cebolla',amount:50,unit:'g'},{name:'Aceite de oliva',amount:30,unit:'ml'},{name:'Sal',amount:1,unit:'al gusto'}]},
    {id:'demo2',name:'Ensalada mediterránea',category:'Primeros',time:'10 min',notes:'',ingredients:[{name:'Tomate',amount:150,unit:'g'},{name:'Pepino',amount:80,unit:'g'},{name:'Aceitunas',amount:40,unit:'g'},{name:'Queso feta',amount:50,unit:'g'},{name:'Aceite de oliva',amount:20,unit:'ml'}]},
    {id:'demo3',name:'Lentejas estofadas',category:'Primeros',time:'45 min',notes:'',ingredients:[{name:'Lentejas',amount:80,unit:'g'},{name:'Zanahoria',amount:60,unit:'g'},{name:'Cebolla',amount:50,unit:'g'},{name:'Pimentón',amount:2,unit:'cdta'},{name:'Aceite de oliva',amount:20,unit:'ml'}]},
  ];
  save();
}
renderRecipes();
renderPlanner();
</script>
